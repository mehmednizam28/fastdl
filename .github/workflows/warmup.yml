name: Global FastDL Warmup
on:
  push:
    branches: [ main ] # Пуска се веднага щом качиш нови файлове
  workflow_dispatch: # Позволява ти да го пуснеш и ръчно

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hit Cloudflare Worker for every file
        run: |
          WORKER_URL="https://https://csfastdl.mehmednizam28.workers.dev/"
          
          # Влизаме в папка csfiles и търсим там
          cd csfiles && find . -type f \( -name "*.bsp" -o -name "*.mdl" -o -name "*.wav" -o -name "*.spr" -o -name "*.wad" \) | sed 's|^\./||' | while read file; do
            echo "Caching: $file"
            curl -s -I "$WORKER_URL/csfiles/$file" > /dev/null
          done
