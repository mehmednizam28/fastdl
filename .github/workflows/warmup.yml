name: Global FastDL Warmup
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Everything from csfiles
        run: |
          # 1. ЗАМЕНИ С ТВОЯ WORKER URL
          WORKER_URL="https://csfastdl.mehmednizam28.workers.dev"
          
          # Влизаме в папката csfiles
          cd csfiles
          
          # Търсим всички файлове и ги пращаме към Worker-а
          find . -type f \( -name "*.bsp" -o -name "*.mdl" -o -name "*.wav" -o -name "*.spr" -o -name "*.wad" \) | sed 's|^\./||' | while read file; do
            echo "Caching: $file"
            # Пращаме заявка към Worker-а (той няма да знае за csfiles отвън, защото той самият си я добавя)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/$file")
            echo "Status: $STATUS"
          done
