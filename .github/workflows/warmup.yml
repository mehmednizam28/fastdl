name: FORCE_CACHE_ALL
on: [push, workflow_dispatch]

jobs:
  fill_cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force Download Everything via Worker
        run: |
          # 1. ТВОЯТ ЛИНК
          WORKER_URL="https://https://csfastdl.mehmednizam28.workers.dev"
          
          echo "Започвам принудително кеширане на всички файлове..."
          
          # Влизаме в csfiles и минаваме през всеки файл
          cd csfiles && find . -type f \( -name "*" \) | sed 's|^\./||' | while read file; do
            echo "Кеширам: $file"
            # ТОВА Е КЛЮЧЪТ: Скриптът ИЗТЕГЛЯ целия файл през Worker-а, 
            # което гарантира, че Cloudflare ще го запази на 100%.
            curl -L -s -o /dev/null "$WORKER_URL/$file"
          done
