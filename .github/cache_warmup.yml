name: Cache Warmup
on: [push] # Стартира се автоматично при всяко качване на файлове

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Ping Cloudflare to cache files
        run: |
          # Смени това с твоя реален URL на Worker-а
          WORKER_URL="https://your-worker-name.your-subdomain.workers.dev"
          
          # Намира всички важни файлове за CS 1.6
          find . -type f \( -name "*.bsp" -o -name "*.wad" -o -name "*.mdl" -o -name "*.spr" -o -name "*.wav" -o -name "*.tga" \) | while read file; do
            # Премахва "./" от пътя на файла
            CLEAN_PATH=$(echo $file | sed 's|^\./||')
            echo "Caching: $WORKER_URL/$CLEAN_PATH"
            # Прави заявка към Cloudflare, за да го принуди да кешира
            curl -s -o /dev/null -I "$WORKER_URL/$CLEAN_PATH"
          done
